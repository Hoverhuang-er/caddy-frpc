# Release workflow: build caddy-frpc binaries and publish to GitHub Releases.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build release binaries
        run: |
          mkdir -p dist
          CADDY_VER=$(grep 'caddyserver/caddy/v2' go.mod | awk '{print $2}')
          PLATFORMS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64"
          for p in $PLATFORMS; do
            GOOS=${p%/*}
            GOARCH=${p#*/}
            BIN="caddy-frpc-${GOOS}-${GOARCH}"
            echo "Building $BIN ..."
            GOOS=$GOOS GOARCH=$GOARCH xcaddy build "$CADDY_VER" \
              --with github.com/Hoverhuang-er/caddy-frpc@${{ github.ref_name }} \
              -o "dist/$BIN"
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
          name: Release ${{ github.ref_name }}
