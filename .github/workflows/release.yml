name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
      - name: Build binary
        env:
          GOPROXY: direct
          GONOSUMCHECK: '*'
          GONOSUMDB: '*'
        run: |
          CADDY_VER=$(grep 'caddyserver/caddy/v2' go.mod | awk '{print $2}')
          BIN="caddy_wh_frpc_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN="${BIN}.exe"
          fi
          mkdir -p dist
          echo "Building ${BIN} (${{ matrix.goos }}/${{ matrix.goarch }}) ..."
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            xcaddy build "$CADDY_VER" \
            --with github.com/Hoverhuang-er/caddy-frpc@${{ github.ref_name }} \
            -o "dist/${BIN}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*-*"
          merge-multiple: true
          path: dist/
      - run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
          name: Release ${{ github.ref_name }}
