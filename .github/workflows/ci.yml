# CI workflow: build, vet, test on every push and PR.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.26']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race -count=1 ./...

  xcaddy-build:
    name: xcaddy Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build caddy with caddy-frpc
        run: |
          CADDY_VER=$(grep 'caddyserver/caddy/v2' go.mod | awk '{print $2}')
          xcaddy build "$CADDY_VER" --with github.com/Hoverhuang-er/caddy-frpc@${{ github.sha }}

      - name: Verify binary
        run: |
          ./caddy version
          ./caddy list-modules | grep frpc
