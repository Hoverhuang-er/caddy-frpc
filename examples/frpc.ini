; frpc.ini — caddy-frpc example configuration (INI legacy format)
; Usage: caddy run --config examples/frpc.ini
; NOTE: INI format is deprecated by frp. Prefer TOML or YAML.

[common]
server_addr = frps.example.com
server_port = 7000
token = my-token
protocol = tcp
pool_count = 4

[web-service]
type = stcp
role = visitor
server_name = backend-web
sk = shared-secret
bind_addr = 127.0.0.1
bind_port = 8000

[p2p-service]
type = xtcp
role = visitor
server_name = remote-p2p
sk = p2p-secret
bind_addr = 127.0.0.1
bind_port = 9000
